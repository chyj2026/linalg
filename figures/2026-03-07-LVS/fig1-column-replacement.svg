<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" font-family="Georgia, serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a3160"/>
    </marker>
  </defs>

  <!-- Original M -->
  <text x="20" y="30" font-weight="bold" fill="#1a3160">M</text>
  <text x="40" y="30" font-style="italic">(n × n)</text>
  <g transform="translate(20,50)" stroke="#1a3160" stroke-width="1.2" fill="none">
    <rect x="0" y="0" width="160" height="160"/>
    <line x1="40" y1="0" x2="40" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="160"/>
    <line x1="120" y1="0" x2="120" y2="160"/>
    <line x1="0" y1="40" x2="160" y2="40"/>
    <line x1="0" y1="80" x2="160" y2="80"/>
    <line x1="0" y1="120" x2="160" y2="120"/>
  </g>
  <!-- column-i highlight -->
  <rect x="60" y="50" width="40" height="160" fill="#ffe9a8" stroke="#a8771a" stroke-width="1.2"/>
  <text x="80" y="230" text-anchor="middle" font-style="italic" fill="#7a5a14">column i</text>

  <!-- arrow -->
  <line x1="210" y1="130" x2="280" y2="130" stroke="#1a3160" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="115" text-anchor="middle" font-style="italic" fill="#1a3160">replace</text>
  <text x="245" y="148" text-anchor="middle" font-style="italic" fill="#1a3160">col i by f</text>

  <!-- Result M^(i ← f) -->
  <text x="310" y="30" font-weight="bold" fill="#1a3160">M</text>
  <text x="324" y="22" font-size="12" fill="#1a3160">(i ← f)</text>
  <g transform="translate(310,50)" stroke="#1a3160" stroke-width="1.2" fill="none">
    <rect x="0" y="0" width="160" height="160"/>
    <line x1="40" y1="0" x2="40" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="160"/>
    <line x1="120" y1="0" x2="120" y2="160"/>
    <line x1="0" y1="40" x2="160" y2="40"/>
    <line x1="0" y1="80" x2="160" y2="80"/>
    <line x1="0" y1="120" x2="160" y2="120"/>
  </g>
  <!-- replaced column = f -->
  <rect x="350" y="50" width="40" height="160" fill="#cfe5cf" stroke="#2c8a4a" stroke-width="1.2"/>
  <text x="370" y="78" text-anchor="middle" font-style="italic" fill="#1a3160">f₁</text>
  <text x="370" y="118" text-anchor="middle" font-style="italic" fill="#1a3160">f₂</text>
  <text x="370" y="158" text-anchor="middle" font-style="italic" fill="#1a3160">f₃</text>
  <text x="370" y="198" text-anchor="middle" font-style="italic" fill="#1a3160">⋮</text>
  <text x="370" y="230" text-anchor="middle" font-style="italic" fill="#2c5a3c">column f</text>

  <!-- formula caption -->
  <text x="280" y="255" text-anchor="middle" font-style="italic" fill="#3a3a3a">
    Cramer:  x_i = det M^(i ← f) ⁄ det M    [eq. (1)]
  </text>
</svg>
