<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="Georgia, serif" font-size="14">
  <defs>
    <marker id="arrowblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a3160"/>
    </marker>
  </defs>

  <!-- Original M -->
  <text x="40" y="30" font-weight="bold" fill="#1a3160">M</text>
  <text x="60" y="30" font-style="italic">(rows 1..n)</text>
  <g transform="translate(40,50)" stroke="#1a3160" stroke-width="1.2" fill="none">
    <rect x="0" y="0" width="200" height="200"/>
    <line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="160" x2="200" y2="160"/>
  </g>
  <!-- Row i highlighted (e.g. i=2) -->
  <rect x="40" y="90" width="200" height="40" fill="#ffe9a8" stroke="#a8771a" stroke-width="1.2"/>
  <text x="245" y="115" font-style="italic" fill="#7a5a14">row i</text>
  <!-- Row k that will be replaced (e.g. k=4) -->
  <rect x="40" y="170" width="200" height="40" fill="#cfe5cf" stroke="#2c8a4a" stroke-width="1.2"/>
  <text x="245" y="195" font-style="italic" fill="#2c5a3c">row k</text>

  <!-- Arrow -->
  <line x1="285" y1="170" x2="345" y2="170" stroke="#1a3160" stroke-width="2" marker-end="url(#arrowblue)"/>
  <text x="315" y="158" text-anchor="middle" font-style="italic" fill="#1a3160">replace</text>
  <text x="315" y="190" text-anchor="middle" font-style="italic" fill="#1a3160">row k by row i</text>

  <!-- M*(k → i) -->
  <text x="370" y="30" font-weight="bold" fill="#1a3160">M*</text>
  <text x="394" y="22" font-size="12" fill="#1a3160">(k ← i)</text>
  <g transform="translate(370,50)" stroke="#1a3160" stroke-width="1.2" fill="none">
    <rect x="0" y="0" width="200" height="200"/>
    <line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="160" x2="200" y2="160"/>
  </g>
  <!-- Two identical rows (both showing row-i content) -->
  <rect x="370" y="90" width="200" height="40" fill="#ffe9a8" stroke="#a8771a" stroke-width="1.2"/>
  <rect x="370" y="170" width="200" height="40" fill="#ffe9a8" stroke="#a8771a" stroke-width="1.2"/>
  <text x="470" y="115" text-anchor="middle" font-style="italic" fill="#7a5a14">row i (original)</text>
  <text x="470" y="195" text-anchor="middle" font-style="italic" fill="#7a5a14">row i (copied)</text>

  <!-- Identical-rows arrow -->
  <line x1="470" y1="138" x2="470" y2="165" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="478" y="155" font-style="italic" font-size="11" fill="#c0392b">identical</text>

  <!-- Bottom caption -->
  <text x="300" y="290" text-anchor="middle" font-style="italic" fill="#3a3a3a">
    Two identical rows  ⇒  det M*(k ← i) = 0     [eq. (12)]
  </text>
  <text x="300" y="318" text-anchor="middle" font-size="13" fill="#1f2330">
    Sum  Σⱼ m_ij · C_kj  =  det M*(k←i)  =  0    when  i ≠ k
  </text>
  <text x="300" y="340" text-anchor="middle" font-size="12" fill="#6b7280">
    (cofactors C_kj unchanged: deleting row k removes the replaced row entirely)
  </text>
</svg>
