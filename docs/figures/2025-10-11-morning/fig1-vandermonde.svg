<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Georgia, serif" font-size="14">
  <defs>
    <marker id="arrowblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a3160"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="22" text-anchor="middle" font-weight="bold" fill="#1a3160">
    Three points → Vandermonde-style linear system
  </text>

  <!-- Left: three points + parabola sketch -->
  <g transform="translate(20,40)">
    <!-- axes -->
    <line x1="20" y1="220" x2="220" y2="220" stroke="#9ca3af" stroke-width="1"/>
    <line x1="120" y1="20" x2="120" y2="240" stroke="#9ca3af" stroke-width="1"/>
    <text x="225" y="225" font-size="11" fill="#9ca3af">x</text>
    <text x="115" y="15"  font-size="11" fill="#9ca3af">y</text>

    <!-- parabola: y = 0.025(x-120)^2 + 100 (in svg coords); show as polyline -->
    <polyline points="40,200 60,165 80,140 100,125 120,120 140,125 160,140 180,165 200,200"
              stroke="#1a3160" stroke-width="2" fill="none"/>

    <!-- three points -->
    <circle cx="60"  cy="165" r="4" fill="#c0392b"/>
    <circle cx="120" cy="120" r="4" fill="#c0392b"/>
    <circle cx="180" cy="165" r="4" fill="#c0392b"/>
    <text x="40"  y="185" font-style="italic" fill="#c0392b">(x₁, y₁)</text>
    <text x="105" y="110" font-style="italic" fill="#c0392b">(x₂, y₂)</text>
    <text x="170" y="185" font-style="italic" fill="#c0392b">(x₃, y₃)</text>

    <text x="120" y="270" text-anchor="middle" font-style="italic" fill="#3a3a3a">
      y = a x² + b x + c
    </text>
  </g>

  <!-- arrow -->
  <line x1="260" y1="160" x2="320" y2="160" stroke="#1a3160" stroke-width="2" marker-end="url(#arrowblue)"/>
  <text x="290" y="148" text-anchor="middle" font-size="12" font-style="italic" fill="#1a3160">substitute</text>

  <!-- Right: the linear system V·p = y -->
  <g transform="translate(340,80)" font-family="serif">
    <!-- V matrix bracket -->
    <text x="10" y="48" font-size="40" fill="#1a3160">(</text>
    <text x="30"  y="32" font-style="italic">x₁²</text>
    <text x="80"  y="32" font-style="italic">x₁</text>
    <text x="120" y="32">1</text>
    <text x="30"  y="60" font-style="italic">x₂²</text>
    <text x="80"  y="60" font-style="italic">x₂</text>
    <text x="120" y="60">1</text>
    <text x="30"  y="88" font-style="italic">x₃²</text>
    <text x="80"  y="88" font-style="italic">x₃</text>
    <text x="120" y="88">1</text>
    <text x="140" y="48" font-size="40" fill="#1a3160">)</text>
    <text x="60" y="115" font-size="11" text-anchor="middle" fill="#7a5a14">V (Vandermonde-style)</text>

    <!-- unknowns column -->
    <text x="170" y="48" font-size="40" fill="#2c8a4a">(</text>
    <text x="188" y="32" font-style="italic">a</text>
    <text x="188" y="60" font-style="italic">b</text>
    <text x="188" y="88" font-style="italic">c</text>
    <text x="200" y="48" font-size="40" fill="#2c8a4a">)</text>
    <text x="194" y="115" font-size="11" text-anchor="middle" fill="#2c5a3c">unknown coefficients</text>

    <!-- equals -->
    <text x="220" y="55" font-size="20">=</text>

    <!-- RHS -->
    <text x="240" y="48" font-size="40" fill="#c0392b">(</text>
    <text x="258" y="32" font-style="italic">y₁</text>
    <text x="258" y="60" font-style="italic">y₂</text>
    <text x="258" y="88" font-style="italic">y₃</text>
    <text x="280" y="48" font-size="40" fill="#c0392b">)</text>
    <text x="265" y="115" font-size="11" text-anchor="middle" fill="#7a1414">given y-values</text>
  </g>

  <!-- bottom caption -->
  <text x="360" y="340" text-anchor="middle" font-style="italic" fill="#3a3a3a">
    det V = −(x₁ − x₂)(x₂ − x₃)(x₃ − x₁)  ≠ 0  iff  x's pairwise distinct    [eq. (14)]
  </text>
</svg>
